name: Build Android APK

on:
  push:
    branches: [ "master" ] # Runs every time you push to main
    tags:
      - 'v*' # Triggers only when you push a tag like v1.0.0
  pull_request:
    branches: [ "master" ] # Runs on every PR

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for creating releases
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: ilharp/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          # Use the signed APK path from the previous step
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}