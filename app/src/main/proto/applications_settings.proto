syntax = "proto3";

option java_package = "com.example.phonotify.datastore";
option java_multiple_files = true;

message ApplicationData {
    string package_name = 1;
    string app_name = 2;
    bytes icon_data = 3;
    bool allow_notifications = 4;

}
message Applications {
    repeated ApplicationData applicationData = 1;
}
